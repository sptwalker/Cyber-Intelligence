include:
  - template: Security/Secret-Detection.gitlab-ci.yml

default:
  tags:
    - AI
  retry: 2
  interruptible: true

.pipeline_changes: &pipeline_changes
  - .gitlab-ci.yml
  - .trivyignore
  - Dockerfile
  - Dockerfile.collector
  - pyproject.toml
  - deploy/**/*
  - yuqing/**/*
  - scripts/**/*

stages:
  - verify
  - build
  - deploy
  - notify

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
    - when: never

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "2"
  GET_SOURCES_ATTEMPTS: "3"
  SWR_REGION: cn-south-1
  IMAGE_TAG: "prod-${CI_COMMIT_SHORT_SHA}"

secret_detection:
  stage: verify

.pipeline_rules:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes: *pipeline_changes
    - when: never

.pip_cache:
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
  cache:
    key:
      prefix: pip
      files:
        - pyproject.toml
    policy: pull-push
    paths:
      - .cache/pip/

# ── verify ─────────────────────────────────────────────────────────────────

verify_python:
  stage: verify
  image: python:3.12-slim
  extends:
    - .pip_cache
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes: *pipeline_changes
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes:
        - tests/**/*
    - when: never
  script:
    - python -m pip install -e ".[all]"
    - python -m unittest discover -v
    - python -m yuqing.selfcheck
    - python -m yuqing.architecture_check
    - python -m yuqing.scheduler selftest
    - python -m compileall -q yuqing
    - python -c "import yuqing"
    - rm -rf dist
    - python -m pip wheel --no-deps --wheel-dir dist .
    - >-
      python -c "import glob,zipfile; wheel=glob.glob('dist/*.whl')[0]; names=set(zipfile.ZipFile(wheel).namelist()); required={'yuqing/web/workbench/index.html','yuqing/web/workbench/styles.css','yuqing/web/workbench/api.js','yuqing/web/workbench/state.js','yuqing/web/workbench/app.js','yuqing/web/workbench/views/overview.js','yuqing/web/workbench/views/collect.js','yuqing/web/workbench/views/review.js','yuqing/web/workbench/views/analysis.js','yuqing/web/workbench/views/incidents.js','yuqing/web/workbench/views/backlog.js','yuqing/web/workbench/views/reports.js','yuqing/web/workbench/views/watch.js'}; missing=required-names; assert not missing, f'missing wheel assets {sorted(missing)}'; assert 'yuqing/dashboard_v2.html' not in names, 'stale dashboard_v2.html packaged'"

# ── build (CCE image and scan) ─────────────────────────────────────────────

.build_cce:
  stage: build
  image: docker:git
  extends: .pipeline_rules
  variables:
    BUILDX_GIT_INFO: "0"
    DOCKER_BUILDKIT: "1"
  before_script:
    - |
      if [ -z "${SWR_AK:-}" ] || [ -z "${SWR_PASSWORD:-}" ]; then
        echo "ERROR: SWR_AK or SWR_PASSWORD CI variable missing" >&2
        exit 1
      fi
    - export SWR_HOST="swr.${SWR_REGION}.myhuaweicloud.com"
    - export SWR_REGISTRY="${SWR_HOST}/nexus-studio"
    - echo "$SWR_PASSWORD" | docker login -u "${SWR_REGION}@${SWR_AK}" --password-stdin "$SWR_HOST"

build_image:
  extends: .build_cce
  script:
    - docker buildx build
        --push --provenance=false --platform linux/amd64
        -t "${SWR_REGISTRY}/cyber-intelligence:${IMAGE_TAG}"
        -f Dockerfile
        .

build_collector_image:
  extends: .build_cce
  script:
    - docker buildx build
        --push --provenance=false --platform linux/amd64
        -t "${SWR_REGISTRY}/cyber-intelligence-collector:${IMAGE_TAG}"
        -f Dockerfile.collector
        .

scan_trivy:
  stage: build
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  extends: .pipeline_rules
  needs:
    - job: build_image
    - job: build_collector_image
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
  before_script:
    - |
      if [ -z "${SWR_AK:-}" ] || [ -z "${SWR_PASSWORD:-}" ]; then
        echo "ERROR: SWR_AK or SWR_PASSWORD CI variable missing" >&2
        exit 1
      fi
    - export SWR_REGISTRY="swr.${SWR_REGION}.myhuaweicloud.com/nexus-studio"
    - export TRIVY_USERNAME="${SWR_REGION}@${SWR_AK}"
    - export TRIVY_PASSWORD="$SWR_PASSWORD"
  script:
    - trivy image --exit-code 1 --ignorefile .trivyignore "${SWR_REGISTRY}/cyber-intelligence:${IMAGE_TAG}"
    - trivy image --exit-code 1 --ignorefile .trivyignore "${SWR_REGISTRY}/cyber-intelligence-collector:${IMAGE_TAG}"

# ── deploy ─────────────────────────────────────────────────────────────────

deploy_cce:
  stage: deploy
  image: alpine:3.19
  extends: .pipeline_rules
  needs:
    - job: build_image
    - job: build_collector_image
    - job: scan_trivy
  retry: 0
  resource_group: cce-production
  environment:
    name: cce-production
  before_script:
    - apk add --no-cache curl
    - curl -fsSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.31.5/bin/linux/amd64/kubectl"
    - chmod +x /usr/local/bin/kubectl
    - |
      if [ -z "${KUBECONFIG_CCE_B64:-}" ]; then
        echo "ERROR: CI variable KUBECONFIG_CCE_B64 is not set" >&2
        exit 1
      fi
      if [ -z "${SWR_AK:-}" ] || [ -z "${SWR_PASSWORD:-}" ]; then
        echo "ERROR: SWR_AK or SWR_PASSWORD CI variable missing" >&2
        exit 1
      fi
    - mkdir -p ~/.kube
    - printf '%s' "$KUBECONFIG_CCE_B64" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    - export SWR_HOST="swr.${SWR_REGION}.myhuaweicloud.com"
  script:
    - kubectl create namespace nexus-prod --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create secret docker-registry swr-registry
        --docker-server="$SWR_HOST"
        --docker-username="${SWR_REGION}@${SWR_AK}"
        --docker-password="$SWR_PASSWORD"
        --namespace=nexus-prod
        --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create secret generic cyber-intelligence-secrets
        --from-literal=FEISHU_APP_ID="${CYBER_FEISHU_APP_ID}"
        --from-literal=FEISHU_APP_SECRET="${CYBER_FEISHU_APP_SECRET}"
        --from-literal=FEISHU_REDIRECT_URI="https://cyber.youdoogo.com/auth/callback"
        --namespace=nexus-prod
        --dry-run=client -o yaml | kubectl apply -f -
    - sed
        -e "s|cyber-intelligence:prod-latest|cyber-intelligence:${IMAGE_TAG}|g"
        -e "s|cyber-intelligence-collector:prod-latest|cyber-intelligence-collector:${IMAGE_TAG}|g"
        deploy/k8s/deployment.yaml | kubectl apply -f - -n nexus-prod
    - kubectl apply -f deploy/k8s/ingress.yaml -n nexus-prod
    - |
      rollout_rc=0
      kubectl rollout status deployment/cyber-intelligence -n nexus-prod --timeout=3m || rollout_rc=$?
      if [ "$rollout_rc" -eq 0 ]; then
        exit 0
      fi

      namespace=nexus-prod
      deployment=cyber-intelligence
      selector='app.kubernetes.io/name=cyber-intelligence'

      echo "ERROR: rollout failed; collecting bounded Kubernetes diagnostics" >&2
      echo "=== Deployment status ==="
      kubectl get "deployment/$deployment" -n "$namespace" \
        -o 'custom-columns=NAME:.metadata.name,GENERATION:.metadata.generation,OBSERVED:.status.observedGeneration,DESIRED:.spec.replicas,UPDATED:.status.updatedReplicas,READY:.status.readyReplicas,AVAILABLE:.status.availableReplicas,UNAVAILABLE:.status.unavailableReplicas' || true

      echo "=== Deployment conditions ==="
      printf 'TYPE\tSTATUS\tREASON\tMESSAGE\n'
      kubectl get "deployment/$deployment" -n "$namespace" \
        -o 'jsonpath={range .status.conditions[*]}{.type}{"\t"}{.status}{"\t"}{.reason}{"\t"}{.message}{"\n"}{end}' || true

      echo "=== Newest matching pods (maximum 5) ==="
      pod_names="$(kubectl get pods -n "$namespace" -l "$selector" \
        --sort-by=.metadata.creationTimestamp -o name | tail -n 5)" || pod_names=""
      if [ -z "$pod_names" ]; then
        echo "No matching pods found (or pod listing failed)."
      else
        for pod in $pod_names; do
          kubectl get "$pod" -n "$namespace" -o wide || true
        done
      fi

      echo "=== Recent namespace events (maximum 40 lines) ==="
      printf 'LAST SEEN\tTYPE\tREASON\tOBJECT\tMESSAGE\n'
      kubectl get events -n "$namespace" --sort-by=.metadata.creationTimestamp --no-headers \
        | tail -n 40 || true

      if [ -n "$pod_names" ]; then
        echo "=== Matching pod descriptions (maximum 220 lines each) ==="
        for pod in $pod_names; do
          echo "--- $pod ---"
          kubectl describe "$pod" -n "$namespace" | sed -n '1,220p' || true
        done
      fi

      exit "$rollout_rc"

# ── notify (only after CCE deployment) ──────────────────────────────────────

.notify_cce:
  stage: notify
  image: python:3.12-slim
  retry: 0
  variables:
    # Reuse OAuth application credentials already held as protected CI variables.
    FEISHU_APP_ID: "$CYBER_FEISHU_APP_ID"
    FEISHU_APP_SECRET: "$CYBER_FEISHU_APP_SECRET"
  script:
    - python3 scripts/ci/notify.py "$NOTIFY_STATUS"

notify_cce_success:
  extends: .notify_cce
  needs:
    - job: deploy_cce
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes: *pipeline_changes
      when: on_success
    - when: never
  variables:
    NOTIFY_STATUS: success

notify_cce_failure:
  extends: .notify_cce
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes: *pipeline_changes
      when: on_failure
    - when: never
  variables:
    NOTIFY_STATUS: failure
