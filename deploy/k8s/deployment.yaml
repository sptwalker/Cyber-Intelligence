apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyber-intelligence
  namespace: nexus-prod
  labels:
    app.kubernetes.io/name: cyber-intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cyber-intelligence
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cyber-intelligence
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: swr-registry
      containers:
        - name: cyber-intelligence
          image: swr.cn-south-1.myhuaweicloud.com/nexus-studio/cyber-intelligence:prod-latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: FEISHU_APP_ID
              valueFrom:
                secretKeyRef:
                  name: cyber-intelligence-secrets
                  key: FEISHU_APP_ID
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: cyber-intelligence-secrets
                  key: FEISHU_APP_SECRET
            - name: FEISHU_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: cyber-intelligence-secrets
                  key: FEISHU_REDIRECT_URI
            - name: YUQING_WATCH_PATH
              value: /data/watch.yaml
            # The dashboard pod never owns an analyst's Chrome/opencli session.
            - name: YUQING_ENABLE_COLLECTION
              value: "false"
            - name: YUQING_COLLECTION_EXECUTION_MODE
              value: kubernetes-dashboard
          command:
            - python
            - -c
            - "from yuqing.dashboard import serve; serve(db='/data/yuqing.db', host='0.0.0.0', port=8080)"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/v1/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /auth/login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cyber-intelligence-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cyber-intelligence-data
  namespace: nexus-prod
  labels:
    app.kubernetes.io/name: cyber-intelligence
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-disk
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cyber-intelligence
  namespace: nexus-prod
  labels:
    app.kubernetes.io/name: cyber-intelligence
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cyber-intelligence
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
